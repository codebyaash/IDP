services:
  - type: web
    name: deployforge-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: REPAIR_LOCAL_SCHEMA
        value: "false"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
