resources:
  - name: rg-risk-dev
    type: resource_group
    provider: azure
    region: eastus
    tags:
      owner: security
      environment: dev
  - name: public-ip-risk-dev
    type: public_ip
    provider: azure
    region: eastus
    dependencies:
      - rg-risk-dev
    public_access: true
    tags:
      owner: security
      environment: dev
  - name: vm-expensive-risk-dev
    type: azurerm_windows_virtual_machine
    provider: azure
    region: eastus
    dependencies:
      - public-ip-risk-dev
    tags:
      owner: security
      environment: dev
  - name: st-empty-tags-risk-dev
    type: storage_account
    provider: azure
    region: eastus
    dependencies:
      - rg-risk-dev
    tags: {}
